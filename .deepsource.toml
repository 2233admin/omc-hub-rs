version = 1

test_patterns = [
  "tests/**",
  "test/**",
  "**/*test*",
  "**/*.test.*",
]

exclude_patterns = [
  "node_modules/**",
  "dist/**",
  "target/**",
  "vendor/**",
  "build/**",
  "coverage/**",
  "bundle.js",
  "**/bundle.js",
  "**/generated/**",
]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
  max_line_length = 120
  cyclomatic_complexity_threshold = "high"

[[analyzers]]
name = "rust"
enabled = true

  [analyzers.meta]
  msrv = "stable"
  cyclomatic_complexity_threshold = "high"

[[analyzers]]
name = "shell"
enabled = true

  [analyzers.meta]
  dialect = "bash"
