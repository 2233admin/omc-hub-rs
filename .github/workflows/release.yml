name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: omc-hub-windows-x86_64.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: omc-hub-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: omc-hub-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: omc-hub-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: omc-hub-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY_NAME: ${{ matrix.name }}
        run: cp "target/${TARGET}/release/omc-hub" "${BINARY_NAME}"

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY_NAME: ${{ matrix.name }}
        run: cp "target/${TARGET}/release/omc-hub.exe" "${BINARY_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: omc-hub-*
          generate_release_notes: true
